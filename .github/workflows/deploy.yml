name: Deploy React App

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write  # or use personal_token if needed

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install
      - run: npm run build
      - uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_PAT }}  # required if branch protected or fork
          publish_dir: ./build
